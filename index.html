<!DOCTYPE html>

<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
    <script type="module" src="./elevation-profile.ts"></script>
    <style>
      body {
        margin: 0;
      }
      .container {
        position: relative;
        margin: 50px;
      }

      #tooltip {
        display: none;
        position: absolute;
        background-color: #707070;
        color: #fff;
        padding: 10px;
        transform: translate(-50%, -100%);
      }

      elevation-profile {
        display: block;
        width: 80%;
        height: 300px;
      }

      elevation-profile .grid.x {
        display: none;
      }

      elevation-profile line {
        shape-rendering: crispEdges;
      }

      elevation-profile .axis .domain, .grid .domain {
        display: none;
      }

      elevation-profile .axis line {
        stroke: rgba(45, 45, 45, 1.0);
      }

      elevation-profile .grid line {
        stroke: rgba(45, 45, 45, 0.25);
      }

      elevation-profile .pointer-line {
        stroke: #707070;
        stroke-opacity: 0.3;
        stroke-width: 2;
        stroke-dasharray: 3, 3;
      }

      elevation-profile .pointer-circle {
        fill: #3761a4;
        stroke: #fff;
        stroke-width: 3;
      }
      elevation-profile .pointer-circle-outline {
        fill: #000;
        fill-opacity: 0.2;
      }

      elevation-profile .elevation, elevation-profile .elevation.highlight {
        stroke: #3761a4;
        stroke-width: 2;
        stroke-linejoin: round;
      }
      elevation-profile .elevation.highlight {
        stroke-width: 3;
      }

      elevation-profile .elevation[data-value="paved"] {
        stroke: #2ecc71;
      }
      elevation-profile .elevation[data-value="unpaved"] {
        stroke: #e67e22;
        stroke-dasharray: 5, 5;
      }

      /* Trail band styles */
      elevation-profile .trail-band {
        fill: transparent;
        height: 2px;
      }
      elevation-profile .trail-band[data-value="bergwanderweg"] {
        fill: #e74c3c;
      }
      elevation-profile .trail-band[data-value="other"] {
        fill: #3498db;
      }

      elevation-profile .area {
        fill: #e6e6e6;
        fill-opacity: 0.85;
      }

      elevation-profile .point {
        fill: #F2000C;
        stroke: #fff;
        stroke-width: 3;
      }

    </style>
  </head>
  <body>
    <div class="container">
      <div id="tooltip"></div>

      <elevation-profile locale="de-CH"></elevation-profile>
    </div>
    <button id="set-lines">multi linestring</button>
    <button id="set-line">linestring</button>
    <button id="save">save as png</button>

    <pre id="logs"></pre>

    <script>
      const profile = document.querySelector("elevation-profile");
      const tooltip = document.querySelector("#tooltip");
      const logs = document.querySelector("#logs");
      const setLines = document.querySelector("#set-lines");
      const setLine = document.querySelector("#set-line");
      const save = document.querySelector("#save");

      save.addEventListener("click", () => {
        const svg = profile.innerHTML;
        const blob = new Blob([svg], { type: "image/svg+xml" });
        const url = URL.createObjectURL(blob);

        const a = document.createElement("a");
        a.href = url;
        a.download = "elevation.svg";
        a.click();
      });

      setLine.addEventListener("click", () => {
        // Generate a more realistic dataset with ~50 points over 5000m distance
        const coordinates = [];
        let baseElevation = 450;

        for (let i = 0; i < 50; i++) {
          const distance = i * 100; // 100m intervals
          // Create elevation variation with some ups and downs
          const elevationChange = Math.sin(i * 0.3) * 80 + Math.cos(i * 0.15) * 40;
          const elevation = baseElevation + elevationChange + (i * 2); // Gradual climb

          coordinates.push([
            2752448 - (i * 50), // X coordinate
            1212435 + (i * 20), // Y coordinate
            Math.round(elevation * 10) / 10, // Elevation
            distance // Distance along route
          ]);
        }

        profile.lines = [coordinates];
        profile.points = [];

        // Add segment data for the line (with holes)
        profile.lineSegments = [
          [22, 35, "paved"],
          [35, 42, "unpaved"],
          [42, 50, "paved"]
        ];

        // Add segment data for trail bands (with holes)
        profile.xAxisSegments = [
          [0, 8, "bergwanderweg"],
          [8, 25, "other"],
          [32, 45, "other"],
          [45, 50, "bergwanderweg"]
        ];
      });

      setLines.addEventListener("click", () => {
        // Generate 3 realistic line segments with varying elevations
        const line1 = [];
        const line2 = [];
        const line3 = [];

        let baseX = 740073;
        let baseY = 5905947;
        let distance = 0;

        // First line: 20 points, gradual climb
        for (let i = 0; i < 20; i++) {
          const elevation = 434 + (i * 3) + Math.sin(i * 0.5) * 15;
          line1.push([
            baseX - (i * 30),
            baseY - (i * 20),
            Math.round(elevation * 10) / 10,
            distance
          ]);
          distance += 40;
        }

        // Second line: 25 points, varied terrain
        baseX = line1[line1.length - 1][0];
        baseY = line1[line1.length - 1][1];
        for (let i = 0; i < 25; i++) {
          const elevation = 490 + Math.sin(i * 0.4) * 30 + Math.cos(i * 0.2) * 20;
          line2.push([
            baseX - (i * 25),
            baseY - (i * 15),
            Math.round(elevation * 10) / 10,
            distance
          ]);
          distance += 35;
        }

        // Third line: 18 points, steep descent then climb
        baseX = line2[line2.length - 1][0];
        baseY = line2[line2.length - 1][1];
        for (let i = 0; i < 18; i++) {
          const elevation = 510 - (i * 2) + Math.sin(i * 0.6) * 25;
          line3.push([
            baseX - (i * 35),
            baseY - (i * 18),
            Math.round(elevation * 10) / 10,
            distance
          ]);
          distance += 45;
        }

        profile.lines = [line1, line2, line3];

        profile.points = [
          line1[0],
          line1[10],
          line2[12],
          line3[line3.length - 1]
        ];

        // Add segment data
        profile.lineSegments = [
          [0, 15, "paved"],
          [15, 28, "unpaved"],
          [28, 45, "paved"],
          [45, 55, "unpaved"],
          [55, 63, "paved"]
        ];

        profile.xAxisSegments = [
          [0, 20, "bergwanderweg"],
          // [10, 30, "other"],
          // [30, 40, "bergwanderweg"],
          // [40, 55, "other"],
          // [55, 63, "bergwanderweg"]
        ];
      });

      profile.addEventListener("over", (event) => {
        logs.textContent = JSON.stringify(event.detail, null, 2);
        tooltip.style.display = "block";
        tooltip.textContent = `${event.detail.coordinate[2]} m`;
        tooltip.style.left = `${event.detail.position.x}px`;
        tooltip.style.top = `${event.detail.position.y - 20}px`;
      });
      profile.addEventListener("out", (event) => {
        logs.textContent = "";
        tooltip.style.display = "none";
      });

      setLines.click();

    </script>
  </body>
</html>
